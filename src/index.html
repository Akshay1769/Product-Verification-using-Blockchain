	<!-- Manufacturer Login Modal -->
<div id="loginModal" style="display:none; position: fixed; top: 25%; left: 35%; z-index: 9999; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px #000; width: 300px;">
  <div class="modal-header"><h4>Manufacturer Login</h4></div>
  <input type="text" id="loginUser" placeholder="User ID" class="form-control my-2">
  <input type="password" id="loginPass" placeholder="Password" class="form-control my-2">
  <button onclick="validateLogin()" class="btn btn-primary">Login</button>
  <button onclick="closeLogin()" class="btn btn-secondary">Cancel</button>
  <p id="loginError" style="color:red;"></p>
</div>

<!-- Seller Login Modal -->
<div id="sellerModal" style="display:none; position: fixed; top: 25%; left: 35%; z-index: 9999; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px #000; width: 300px;">
  <div class="modal-header"><h4>Seller Login</h4></div>
  <input type="text" id="sellerUser" placeholder="User ID" class="form-control my-2">
  <input type="password" id="sellerPass" placeholder="Password" class="form-control my-2">
  <button onclick="validateSeller()" class="btn btn-primary">Login</button>
  <button onclick="closeSeller()" class="btn btn-secondary">Cancel</button>
  <p id="sellerError" style="color:red;"></p>
</div>

<script>
  function openLogin() {
    document.getElementById('loginModal').style.display = 'block';
  }

  function closeLogin() {
    document.getElementById('loginModal').style.display = 'none';
    document.getElementById('loginError').innerText = '';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
  }

  function validateLogin() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    if (user === "admin" && pass === "admin123") {
      window.location.href = "manufacturer.html";
    } else {
      document.getElementById('loginError').innerText = "Invalid credentials!";
    }
  }

  function openSeller() {
    document.getElementById('sellerModal').style.display = 'block';
  }

  function closeSeller() {
    document.getElementById('sellerModal').style.display = 'none';
    document.getElementById('sellerError').innerText = '';
    document.getElementById('sellerUser').value = '';
    document.getElementById('sellerPass').value = '';
  }

  function validateSeller() {
    const user = document.getElementById('sellerUser').value.trim();
    const pass = document.getElementById('sellerPass').value.trim();
    if (user === "seller" && pass === "seller123") {
      window.location.href = "seller.html";
    } else {
      document.getElementById('sellerError').innerText = "Invalid credentials!";
    }
  }
</script>
